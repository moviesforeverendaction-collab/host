version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: telegram-bot-mongo
    restart: always
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=telegram_host_bot

  bot:
    build: .
    container_name: telegram-host-bot
    restart: always
    depends_on:
      - mongodb
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/app/logs
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/

volumes:
  mongodb_data:
